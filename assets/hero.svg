<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 440" width="1280" height="440" role="img" aria-label="MateMatic Solutions - AI that knows what it doesn't know. We know how.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e1218"/>
      <stop offset="1" stop-color="#080a0e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="46%" r="60%">
      <stop offset="0" stop-color="#10b981" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34d399" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#34d399" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="440" fill="url(#bg)"/>
  <rect width="1280" height="440" fill="url(#glow)"/>

  <!-- four-square mark -->
  <g transform="translate(623.5 26)">
    <rect x="0"  y="0"  width="14" height="14" rx="3" fill="#1E3A5F"/>
    <rect x="17" y="0"  width="14" height="14" rx="3" fill="#9BA0A8"/>
    <rect x="0"  y="17" width="14" height="14" rx="3" fill="#6C717A"/>
    <rect x="17" y="17" width="14" height="14" rx="3" fill="#D4A537"/>
  </g>

  <!-- wordmark -->
  <text x="640" y="90" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="15" letter-spacing="6" font-weight="500" fill="#8b93a1">MATEMATIC&#160;&#160;SOLUTIONS</text>

  <!-- headline -->
  <text x="640" y="196" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="64" fill="#f5f5f4">AI that <tspan font-style="italic">knows</tspan></text>
  <text x="640" y="266" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="64" fill="#f5f5f4">what it doesn&#8217;t know.</text>

  <!-- tagline -->
  <text x="640" y="318" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="18" letter-spacing="10" font-weight="600" fill="#34d399">WE&#160;KNOW&#160;HOW</text>

  <!-- rule -->
  <rect x="440" y="356" width="400" height="1.5" fill="url(#rule)"/>

  <!-- subtitle -->
  <text x="640" y="392" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="14.5" letter-spacing="0.3" fill="#9aa3b2">Grounded legal-AI infrastructure&#160;&#160;&#183;&#160;&#160;41 open MCP connectors&#160;&#160;&#183;&#160;&#160;32 jurisdictions&#160;&#160;&#183;&#160;&#160;30M+ source documents</text>
</svg>
